<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>x-wil.com</title>
  <meta name="description" content="x-wil.com - Cyberpunk personal portal">
  <meta name="author" content="wil">
  <meta property="og:title" content="x-wil.com">
  <meta property="og:description" content="Cyberpunk personal portal">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://x-wil.com">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --neon-green: #0afff0;
      --neon-pink: #ff2a6d;
      --neon-purple: #9d4edd;
      --neon-blue: #00b4d8;
      --dark: #0a0a0f;
    }

    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      opacity: 0.6;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .glitch-wrapper {
      position: relative;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--neon-green), var(--neon-blue), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      animation: glitch 3s infinite;
    }

    h1::before,
    h1::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--dark);
    }

    h1::before {
      left: 2px;
      text-shadow: -2px 0 var(--neon-pink);
      clip-path: inset(0 0 0 0);
      animation: glitch-top 3s infinite;
    }

    h1::after {
      left: -2px;
      text-shadow: 2px 0 var(--neon-green);
      clip-path: inset(0 0 0 0);
      animation: glitch-bot 3s infinite;
    }

    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-2px, 1px); }
      94% { transform: translate(2px, -1px); }
      96% { transform: translate(-1px, 2px); }
      98% { transform: translate(1px, -2px); }
    }

    @keyframes glitch-top {
      0%, 90%, 100% { clip-path: inset(0 0 100% 0); }
      92% { clip-path: inset(20% 0 60% 0); }
      94% { clip-path: inset(60% 0 20% 0); }
      96% { clip-path: inset(40% 0 40% 0); }
      98% { clip-path: inset(10% 0 80% 0); }
    }

    @keyframes glitch-bot {
      0%, 90%, 100% { clip-path: inset(100% 0 0 0); }
      92% { clip-path: inset(60% 0 20% 0); }
      94% { clip-path: inset(20% 0 60% 0); }
      96% { clip-path: inset(80% 0 10% 0); }
      98% { clip-path: inset(50% 0 30% 0); }
    }

    .subtitle {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.8rem, 2vw, 1.2rem);
      color: var(--neon-green);
      letter-spacing: 0.5em;
      margin-top: 1.5rem;
      opacity: 0.8;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.8; }
      92% { opacity: 0.8; }
      93% { opacity: 0.3; }
      94% { opacity: 0.9; }
      95% { opacity: 0.4; }
      96% { opacity: 0.9; }
    }

    .links {
      display: flex;
      gap: 2rem;
      margin-top: 4rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .link {
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      color: #fff;
      text-decoration: none;
      padding: 1rem 2rem;
      border: 1px solid var(--neon-green);
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(10, 255, 240, 0.3), transparent);
      transition: left 0.5s;
    }

    .link:hover::before {
      left: 100%;
    }

    .link:hover {
      background: rgba(10, 255, 240, 0.1);
      box-shadow: 0 0 20px rgba(10, 255, 240, 0.5), inset 0 0 20px rgba(10, 255, 240, 0.1);
      text-shadow: 0 0 10px var(--neon-green);
    }

    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.1) 0px,
        rgba(0, 0, 0, 0.1) 1px,
        transparent 1px,
        transparent 2px
      );
    }

    .corner {
      position: fixed;
      width: clamp(30px, 5vw, 100px);
      height: clamp(30px, 5vw, 100px);
      border: 2px solid var(--neon-green);
      opacity: 0.5;
    }

    .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
    .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
    .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

    /* 开源项目推荐样式 */
    .oss-section {
      margin-top: 5rem;
      width: 100%;
      max-width: 700px;
      text-align: center;
    }

    .oss-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      color: var(--neon-green);
      letter-spacing: 0.2em;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    .oss-card {
      background: rgba(10, 255, 240, 0.05);
      border: 1px solid rgba(10, 255, 240, 0.3);
      padding: 2rem;
      text-align: left;
      position: relative;
      transition: all 0.3s;
    }

    .oss-card:hover {
      border-color: var(--neon-green);
      box-shadow: 0 0 30px rgba(10, 255, 240, 0.2);
    }

    .oss-card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      background: linear-gradient(135deg, var(--neon-green), var(--neon-purple), var(--neon-pink));
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .oss-card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .oss-name {
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--neon-green);
    }

    .oss-badge {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      padding: 0.2rem 0.6rem;
      border: 1px solid var(--neon-pink);
      color: var(--neon-pink);
      letter-spacing: 0.1em;
    }

    .oss-desc {
      color: rgba(255,255,255,0.7);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.2rem;
    }

    .oss-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .oss-tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border: 1px solid rgba(10, 255, 240, 0.4);
      color: var(--neon-blue);
      letter-spacing: 0.05em;
    }

    .oss-link {
      display: inline-block;
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      color: var(--neon-green);
      text-decoration: none;
      padding: 0.6rem 1.5rem;
      border: 1px solid var(--neon-green);
      transition: all 0.3s;
      letter-spacing: 0.1em;
    }

    .oss-link:hover {
      background: rgba(10, 255, 240, 0.15);
      box-shadow: 0 0 15px rgba(10, 255, 240, 0.4);
    }

    .status {
      position: fixed;
      bottom: 30px;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      color: var(--neon-green);
      opacity: 0.6;
    }

    .status::before {
      content: '>';
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    @media (max-width: 768px) {
      .links { flex-direction: column; gap: 1rem; }
      .links .link { width: 100%; text-align: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .scanlines { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="scanlines"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="container">
    <div class="glitch-wrapper">
      <h1 data-text="x-wil.com">x-wil.com</h1>
    </div>
    <p class="subtitle">— SYSTEM ONLINE —</p>
    <div class="links">
      <a href="https://github.com/wssaidong" class="link" target="_blank" rel="noopener">GitHub</a>
      <a href="https://x-wil.com/blog" class="link">Blog</a>
      <a href="https://x-wil.com/projects" class="link">Projects</a>
      <a href="mailto:hi@x-wil.com" class="link">Contact</a>
    </div>

    <!-- 开源项目推荐 -->
    <div class="oss-section">
      <h2 class="oss-title">⚡ 开源项目推荐</h2>
      <div class="oss-card">
        <div class="oss-card-header">
          <span class="oss-name">oss-pages</span>
          <span class="oss-badge">GitHub</span>
        </div>
        <p class="oss-desc">零成本部署静态页面 — 使用 GitHub Actions + GitHub Pages，无需服务器即可托管个人博客、产品页和开源项目介绍。</p>
        <div class="oss-tags">
          <span class="oss-tag">静态网站</span>
          <span class="oss-tag">GitHub Actions</span>
          <span class="oss-tag">免费托管</span>
          <span class="oss-tag">CI/CD</span>
        </div>
        <a href="https://github.com/wssaidong/oss-pages" class="oss-link" target="_blank" rel="noopener">
          访问项目 →
        </a>
      </div>
    </div>
  </div>

  <div class="status">PORTAL ACTIVE</div>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    const chars = '01';
    const fontSize = 14;
    let columns;
    let drops = [];

    function init() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      columns = Math.floor(canvas.width / fontSize);
      drops = Array(columns).fill(1);
    }

    function draw() {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#0afff0';
      ctx.font = `${fontSize}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const char = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(char, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    init();
    setInterval(draw, 50);
    window.addEventListener('resize', init);
  </script>
</body>
</html>
