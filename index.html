<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>x-wil.com</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --neon-green: #0afff0;
      --neon-pink: #ff2a6d;
      --neon-purple: #9d4edd;
      --neon-blue: #00b4d8;
      --dark: #0a0a0f;
    }

    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      opacity: 0.6;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .glitch-wrapper {
      position: relative;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--neon-green), var(--neon-blue), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      animation: glitch 3s infinite;
    }

    h1::before,
    h1::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--dark);
    }

    h1::before {
      left: 2px;
      text-shadow: -2px 0 var(--neon-pink);
      clip-path: inset(0 0 0 0);
      animation: glitch-top 3s infinite;
    }

    h1::after {
      left: -2px;
      text-shadow: 2px 0 var(--neon-green);
      clip-path: inset(0 0 0 0);
      animation: glitch-bot 3s infinite;
    }

    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-2px, 1px); }
      94% { transform: translate(2px, -1px); }
      96% { transform: translate(-1px, 2px); }
      98% { transform: translate(1px, -2px); }
    }

    @keyframes glitch-top {
      0%, 90%, 100% { clip-path: inset(0 0 100% 0); }
      92% { clip-path: inset(20% 0 60% 0); }
      94% { clip-path: inset(60% 0 20% 0); }
      96% { clip-path: inset(40% 0 40% 0); }
      98% { clip-path: inset(10% 0 80% 0); }
    }

    @keyframes glitch-bot {
      0%, 90%, 100% { clip-path: inset(100% 0 0 0); }
      92% { clip-path: inset(60% 0 20% 0); }
      94% { clip-path: inset(20% 0 60% 0); }
      96% { clip-path: inset(80% 0 10% 0); }
      98% { clip-path: inset(50% 0 30% 0); }
    }

    .subtitle {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.8rem, 2vw, 1.2rem);
      color: var(--neon-green);
      letter-spacing: 0.5em;
      margin-top: 1.5rem;
      opacity: 0.8;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.8; }
      92% { opacity: 0.8; }
      93% { opacity: 0.3; }
      94% { opacity: 0.9; }
      95% { opacity: 0.4; }
      96% { opacity: 0.9; }
    }

    .links {
      display: flex;
      gap: 2rem;
      margin-top: 4rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .link {
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      color: #fff;
      text-decoration: none;
      padding: 1rem 2rem;
      border: 1px solid var(--neon-green);
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(10, 255, 240, 0.3), transparent);
      transition: left 0.5s;
    }

    .link:hover::before {
      left: 100%;
    }

    .link:hover {
      background: rgba(10, 255, 240, 0.1);
      box-shadow: 0 0 20px rgba(10, 255, 240, 0.5), inset 0 0 20px rgba(10, 255, 240, 0.1);
      text-shadow: 0 0 10px var(--neon-green);
    }

    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.1) 0px,
        rgba(0, 0, 0, 0.1) 1px,
        transparent 1px,
        transparent 2px
      );
    }

    .corner {
      position: fixed;
      width: 100px;
      height: 100px;
      border: 2px solid var(--neon-green);
      opacity: 0.5;
    }

    .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
    .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
    .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

    .status {
      position: fixed;
      bottom: 30px;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      color: var(--neon-green);
      opacity: 0.6;
    }

    .status::before {
      content: '>';
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    @media (max-width: 768px) {
      .links { flex-direction: column; gap: 1rem; }
      .corner { width: 50px; height: 50px; }
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="scanlines"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="container">
    <div class="glitch-wrapper">
      <h1 data-text="x-wil.com">x-wil.com</h1>
    </div>
    <p class="subtitle">— SYSTEM ONLINE —</p>
    <div class="links">
      <a href="#" class="link">Portfolio</a>
      <a href="#" class="link">Projects</a>
      <a href="#" class="link">About</a>
      <a href="#" class="link">Contact</a>
    </div>
  </div>

  <div class="status">PORTAL ACTIVE</div>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#0afff0';
      ctx.font = `${fontSize}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const char = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(char, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(draw, 50);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
